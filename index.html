<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>KPSS Tarih — Sınav Defteri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@500&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; font-family: 'Source Serif 4', Georgia, serif; background: radial-gradient(ellipse at top, #F3EBD9 0%, #E9DDC0 55%, #DFCFA8 100%); color: #2B2620; }
  body { display: flex; align-items: center; justify-content: center; padding: 16px; }
  .wrap { width: 100%; max-width: 440px; }
  .paper { background-color: #FBF6E9; border: 1px solid #D8C7A0; box-shadow: 0 12px 30px -8px rgba(43,38,32,0.25); border-radius: 3px; padding: 28px 26px; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #8B2635; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  h1.title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 42px; line-height: 1.1; margin: 6px 0 8px; }
  .btn-primary { width: 100%; padding: 13px 0; border-radius: 3px; border: none; background: #2B2620; color: #F3EBD9; font-family: inherit; font-weight: 600; cursor: pointer; }
  .option { text-align: left; padding: 12px 16px; border-radius: 3px; font-family: inherit; font-size: 15px; cursor: pointer; background: transparent; border: 1px solid #C9B688; color: #2B2620; margin-bottom: 10px; width: 100%; }
  .option.correct { background: #E4EEE6; border-color: #3F6B4F; color: #2C4A36; }
  .option.wrong { background: #F4E1E2; border-color: #8B2635; color: #6E1D28; }
  .progress-track { width: 100%; height: 4px; background: #E3D5AE; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: #B8935A; transition: width .3s ease; }
</style>
</head>
<body>
<div class="wrap"><div id="root"></div></div>

<script>
"use strict";

const QUESTIONS = [
  { id: 1, topic: "İslamiyet Öncesi", q: "İslamiyet öncesi Türklerde 'hükümdarlık yetkisinin Tanrı tarafından verildiğine' inanılan anlayış nedir?", options: ["Kut", "Kurultay", "Töre", "Toy"], correct: 0 },
  { id: 2, topic: "İslamiyet Öncesi", q: "Türklerin ilk ana yurdu neresidir?", options: ["Ötüken", "Anadolu", "Mısır", "İran"], correct: 0 },
  { id: 3, topic: "İslamiyet Öncesi", q: "Türk adının anlamı aşağıdakilerden hangisidir?", options: ["Güçlü-Kuvvetli", "Savaşçı", "Göç eden", "Türeyen"], correct: 0 },
  { id: 4, topic: "İslamiyet Öncesi", q: "İslamiyet öncesi Türklerde devlet işlerinin görüşüldüğü meclise ne ad verilir?", options: ["Kurultay", "Kengeş", "Toygun", "Ayuki"], correct: 0 },
  { id: 5, topic: "İslamiyet Öncesi", q: "İlk Türk devletlerinde ölen kişinin ardından yakılan ağıtlara ne denir?", options: ["Sagu", "Koşuk", "Sav", "Destan"], correct: 0 }
];

const TOPICS = ["İslamiyet Öncesi"];
let state = { screen: "start", topic: "İslamiyet Öncesi", pool: [], idx: 0, selected: null, answers: [] };

function render() {
  const root = document.getElementById("root");
  if (state.screen === "start") {
    root.innerHTML = '<div class="paper"><h1 class="title">KPSS Tarih</h1><button class="btn-primary" onclick="start()">Sınava Başla</button></div>';
  } else {
    const cur = state.pool[state.idx];
    root.innerHTML = '<div class="paper"><div class="progress-track"><div class="progress-fill" style="width:' + ((state.idx/state.pool.length)*100) + '%"></div></div><h2>'+cur.q+'</h2>' + 
    cur.options.map((o, i) => `<button class="option ${state.selected !== null ? (i === cur.correct ? 'correct' : (i === state.selected ? 'wrong' : '')) : ''}" onclick="select(${i})">${o}</button>`).join('') + 
    (state.selected !== null ? `<button class="btn-primary" onclick="next()">Sonraki</button>` : '') + '</div>';
  }
}

function start() { state.pool = QUESTIONS; state.screen = "quiz"; render(); }
function select(i) { if(state.selected === null) { state.selected = i; render(); } }
function next() { if(state.idx + 1 < state.pool.length) { state.idx++; state.selected = null; render(); } else { alert("Test bitti!"); location.reload(); } }

render();
</script>
</body>
</html>
