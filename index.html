<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KPSS Tarih — Sınav Defteri</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: sans-serif; background: #F3EBD9; padding: 20px; display: flex; justify-content: center; }
  .paper { background: #FBF6E9; border: 1px solid #D8C7A0; padding: 20px; width: 100%; max-width: 440px; border-radius: 3px; }
  .btn-primary { width: 100%; padding: 15px; background: #2B2620; color: #F3EBD9; border: none; cursor: pointer; margin-top: 10px; }
  .option { width: 100%; padding: 12px; margin: 5px 0; background: transparent; border: 1px solid #C9B688; cursor: pointer; text-align: left; }
  .option.correct { background: #E4EEE6; border-color: #3F6B4F; }
  .option.wrong { background: #F4E1E2; border-color: #8B2635; }
  .question { font-size: 20px; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="wrap"><div id="root"></div></div>

<script>
"use strict";

const QUESTIONS = [
  { id: 1, topic: "İslamiyet Öncesi", q: "İslamiyet öncesi Türklerde 'hükümdarlık yetkisinin Tanrı tarafından verildiğine' inanılan anlayış nedir?", options: ["Kut", "Kurultay", "Töre", "Toy"], correct: 0 },
  { id: 2, topic: "İslamiyet Öncesi", q: "Türklerin ilk ana yurdu neresidir?", options: ["Ötüken", "Anadolu", "Mısır", "İran"], correct: 0 },
  { id: 3, topic: "İslamiyet Öncesi", q: "Türk adının anlamı aşağıdakilerden hangisidir?", options: ["Güçlü-Kuvvetli", "Savaşçı", "Göç eden", "Türeyen"], correct: 0 },
  { id: 4, topic: "İslamiyet Öncesi", q: "İslamiyet öncesi Türklerde devlet işlerinin görüşüldüğü meclise ne ad verilir?", options: ["Kurultay", "Kengeş", "Toygun", "Ayuki"], correct: 0 },
  { id: 5, topic: "İslamiyet Öncesi", q: "İlk Türk devletlerinde ölen kişinin ardından yakılan ağıtlara ne denir?", options: ["Sagu", "Koşuk", "Sav", "Destan"], correct: 0 },
  { id: 6, topic: "İslamiyet Öncesi", q: "Türklerin tarih boyunca kullandığı ilk takvim hangisidir?", options: ["12 Hayvanlı Türk Takvimi", "Celali Takvim", "Hicri Takvim", "Miladi Takvim"], correct: 0 },
  { id: 7, topic: "İslamiyet Öncesi", q: "İslamiyet öncesi Türklerde hükümdarın eşine ne ad verilir?", options: ["Hatun", "Kağan", "Yabgu", "Tegin"], correct: 0 },
  { id: 8, topic: "İslamiyet Öncesi", q: "Türk tarihinde 'kendi adına para bastıran ilk hükümdar' kimdir?", options: ["Baga Tarkan", "Mete Han", "Bumin Kağan", "Bilge Kağan"], correct: 0 },
  { id: 9, topic: "İslamiyet Öncesi", q: "Oğuz Kağan Destanı hangi Türk devletine aittir?", options: ["Asya Hun Devleti", "Göktürkler", "Uygurlar", "Avarlar"], correct: 0 },
  { id: 10, topic: "İslamiyet Öncesi", q: "Türklerde 'sözlü hukuk kurallarına' ne ad verilir?", options: ["Töre", "Kut", "Vergi", "Yuğ"], correct: 0 },
  { id: 11, topic: "İslamiyet Öncesi", q: "Yerleşik hayata geçen ilk Türk devleti hangisidir?", options: ["Uygurlar", "Göktürkler", "Hunlar", "Hazarlar"], correct: 0 },
  { id: 12, topic: "İslamiyet Öncesi", q: "İslamiyet öncesi Türklerde cenaze törenlerine ne ad verilir?", options: ["Yuğ", "Şölen", "Toy", "Töre"], correct: 0 },
  { id: 13, topic: "İslamiyet Öncesi", q: "Orhun Abideleri hangi devlet döneminde dikilmiştir?", options: ["II. Göktürk Devleti", "I. Göktürk Devleti", "Uygurlar", "Hunlar"], correct: 0 },
  { id: 14, topic: "İslamiyet Öncesi", q: "İslamiyet öncesi Türklerde ordu komutanlarına ne ad verilir?", options: ["Tarkan", "Tigin", "Şad", "Aygucı"], correct: 0 },
  { id: 15, topic: "İslamiyet Öncesi", q: "Türk tarihinin 'ilk yazılı eseri' kabul edilen metinler hangisidir?", options: ["Orhun Abideleri", "Manas Destanı", "Yenisey Yazıtları", "Alp Er Tunga Destanı"], correct: 0 }
];

var state = { screen: "start", pool: [], idx: 0, selected: null };

function startQuiz() {
  state.pool = QUESTIONS; 
  state.idx = 0; state.selected = null;
  state.screen = "quiz";
  render();
}

function render() {
  var root = document.getElementById("root");
  if (state.screen === "start") {
    root.innerHTML = '<div class="paper"><h1>KPSS Tarih</h1><button class="btn-primary" id="start-btn">Sınava Başla</button></div>';
    document.getElementById("start-btn").onclick = startQuiz;
  } else if (state.screen === "quiz") {
    var cur = state.pool[state.idx];
    root.innerHTML = '<div class="paper"><h2 class="question">'+cur.q+'</h2>' +
      cur.options.map((o, i) => `<button class="option" onclick="check(${i})">${o}</button>`).join('') + '</div>';
  }
}

function check(i) {
  var cur = state.pool[state.idx];
  if(i === cur.correct) alert("Doğru!");
  else alert("Yanlış!");
  if(state.idx + 1 < state.pool.length) { state.idx++; render(); }
  else { alert("Test Bitti"); location.reload(); }
}

render();
</script>
</body>
</html>
