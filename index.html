<script>
  // window.storage shim -- persists high score in the browser's localStorage
  // so the site works as a fully standalone page (no Claude artifact backend needed).
  window.storage = {
    async get(key, shared) {
      try {
        const raw = localStorage.getItem("kpss_" + key);
        if (raw === null) throw new Error("not found");
        return { key, value: raw, shared: !!shared };
      } catch (e) {
        throw e;
      }
    },
    async set(key, value, shared) {
      try {
        localStorage.setItem("kpss_" + key, value);
        return { key, value, shared: !!shared };
      } catch (e) {
        return null;
      }
    },
    async delete(key, shared) {
      try {
        localStorage.removeItem("kpss_" + key);
        return { key, deleted: true, shared: !!shared };
      } catch (e) {
        return null;
      }
    },
    async list(prefix, shared) {
      try {
        const keys = Object.keys(localStorage)
          .filter((k) => k.startsWith("kpss_" + (prefix || "")))
          .map((k) => k.replace("kpss_", ""));
        return { keys, prefix, shared: !!shared };
      } catch (e) {
        return null;
      }
    }
  };
</script>

const TOPICS = ["Tümü", ...Array.from(new Set(QUESTIONS.map((q) => q.topic)))];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------------------------------------------------------------------------
// Seal / stamp component — the signature visual element
// ---------------------------------------------------------------------------
function Seal({ state }) {
  // state: 'idle' | 'correct' | 'wrong'
  const color = state === "correct" ? "#3F6B4F" : state === "wrong" ? "#8B2635" : "#B8935A";
  return (
    <svg
      viewBox="0 0 120 120"
      className={`w-16 h-16 transition-all duration-500 ${
        state === "idle" ? "opacity-40 scale-90" : "opacity-100 scale-100"
      }`}
      style={{ filter: state !== "idle" ? "drop-shadow(0 2px 4px rgba(0,0,0,0.25))" : "none" }}
    >
      <circle cx="60" cy="60" r="54" fill="none" stroke={color} strokeWidth="3" />
      <circle cx="60" cy="60" r="46" fill="none" stroke={color} strokeWidth="1.5" strokeDasharray="2 3" />
      <text
        x="60"
        y="68"
        textAnchor="middle"
        fontSize="34"
        fontFamily="Cormorant Garamond, serif"
        fill={color}
        fontWeight="600"
      >
        {state === "correct" ? "✓" : state === "wrong" ? "✕" : "?"}
      </text>
    </svg>
  );
}

function KpssTarihQuiz() {
  const [screen, setScreen] = useState("start"); // start | quiz | result
  const [topic, setTopic] = useState("Tümü");
  const [count, setCount] = useState(15);
  const [pool, setPool] = useState([]);
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState([]); // { qid, chosen, correct }
  const [sealState, setSealState] = useState("idle");
  const [bestScore, setBestScore] = useState(null);
  const cardRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("kpss-tarih-best", false);
        if (res) setBestScore(JSON.parse(res.value));
      } catch (e) {
        /* no record yet */
      }
    })();
  }, []);

  const available = useMemo(
    () => (topic === "Tümü" ? QUESTIONS : QUESTIONS.filter((q) => q.topic === topic)),
    [topic]
  );

  function startQuiz() {
    const n = Math.min(count, available.length);
    setPool(shuffle(available).slice(0, n));
    setIdx(0);
    setAnswers([]);
    setSelected(null);
    setSealState("idle");
    setScreen("quiz");
  }

  function choose(i) {
    if (selected !== null) return;
    setSelected(i);
    const current = pool[idx];
    const isCorrect = i === current.correct;
    setSealState(isCorrect ? "correct" : "wrong");
    setAnswers((a) => [...a, { qid: current.id, chosen: i, correct: current.correct }]);
  }

  async function next() {
    if (idx + 1 >= pool.length) {
      const score = answers.filter((a) => a.chosen === a.correct).length;
      const pct = Math.round((score / pool.length) * 100);
      if (!bestScore || pct > bestScore.pct) {
        const rec = { pct, score, total: pool.length, date: new Date().toISOString() };
        setBestScore(rec);
        try {
          await window.storage.set("kpss-tarih-best", JSON.stringify(rec), false);
        } catch (e) {
          /* ignore storage failure */
        }
      }
      setScreen("result");
      return;
    }
    setIdx((v) => v + 1);
    setSelected(null);
    setSealState("idle");
  }

  const score = answers.filter((a) => a.chosen === a.correct).length;
  const current = pool[idx];

  return (
    <div
      className="min-h-screen w-full flex items-center justify-center p-4"
      style={{
        background:
          "radial-gradient(ellipse at top, #F3EBD9 0%, #E9DDC0 55%, #DFCFA8 100%)",
        fontFamily: "'Source Serif 4', Georgia, serif",
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@500&display=swap');
        .paper {
          background-color: #FBF6E9;
          background-image:
            radial-gradient(circle at 15% 20%, rgba(184,147,90,0.08) 0%, transparent 45%),
            radial-gradient(circle at 85% 80%, rgba(139,38,53,0.06) 0%, transparent 50%);
          border: 1px solid #D8C7A0;
          box-shadow: 0 12px 30px -8px rgba(43,38,32,0.25), 0 1px 0 rgba(255,255,255,0.6) inset;
        }
        .torn-edge {
          position: relative;
        }
        .btn-opt {
          transition: all 0.18s ease;
        }
        .btn-opt:focus-visible {
          outline: 2px solid #8B2635;
          outline-offset: 2px;
        }
        @media (prefers-reduced-motion: reduce) {
          * { transition: none !important; animation: none !important; }
        }
      `}</style>

      {screen === "start" && (
        <div className="paper torn-edge rounded-sm w-full max-w-md p-7 sm:p-9">
          <div className="flex items-center justify-between mb-1">
            <span
              className="text-[11px] tracking-[0.25em] uppercase"
              style={{ color: "#8B2635", fontFamily: "'JetBrains Mono', monospace" }}
            >
              KPSS · Tarih
            </span>
            <Seal state="idle" />
          </div>
          <h1
            className="text-4xl sm:text-5xl mb-2 leading-tight"
            style={{ fontFamily: "'Cormorant Garamond', serif", color: "#2B2620", fontWeight: 700 }}
          >
            Sınav Defteri
          </h1>
          <p className="text-sm mb-7" style={{ color: "#5B5140" }}>
            Osmanlı ve Cumhuriyet tarihinden çoktan seçmeli sorularla kendini sına.
          </p>

          {bestScore && (
            <div
              className="mb-6 px-4 py-3 rounded-sm text-sm flex items-center justify-between"
              style={{ background: "#EFE4C7", border: "1px solid #D8C7A0", color: "#4A3F2E" }}
            >
              <span>En iyi sonucun</span>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>
                {bestScore.score}/{bestScore.total} · %{bestScore.pct}
              </span>
            </div>
          )}

          <label className="block text-xs uppercase tracking-wider mb-2" style={{ color: "#8B7355" }}>
            Konu
          </label>
          <div className="flex flex-wrap gap-2 mb-6">
            {TOPICS.map((t) => (
              <button
                key={t}
                onClick={() => setTopic(t)}
                className="btn-opt px-3 py-1.5 rounded-sm text-sm"
                style={{
                  background: topic === t ? "#2B2620" : "transparent",
                  color: topic === t ? "#F3EBD9" : "#4A3F2E",
                  border: "1px solid #C9B688",
                }}
              >
                {t}
              </button>
            ))}
          </div>

          <label className="block text-xs uppercase tracking-wider mb-2" style={{ color: "#8B7355" }}>
            Soru sayısı
          </label>
          <div className="flex gap-2 mb-8">
            {[10, 15, 20, available.length].filter((v, i, a) => a.indexOf(v) === i && v > 0).map((n) => (
              <button
                key={n}
                onClick={() => setCount(n)}
                className="btn-opt flex-1 py-2 rounded-sm text-sm"
                style={{
                  background: count === n ? "#8B2635" : "transparent",
                  color: count === n ? "#FBF6E9" : "#4A3F2E",
                  border: "1px solid #C9B688",
                  fontFamily: "'JetBrains Mono', monospace",
                }}
              >
                {n === available.length ? "Tümü" : n}
              </button>
            ))}
          </div>

          <button
            onClick={startQuiz}
            className="btn-opt w-full py-3 rounded-sm text-base tracking-wide"
            style={{ background: "#2B2620", color: "#F3EBD9", fontWeight: 600 }}
          >
            Sınava Başla
          </button>
        </div>
      )}

      {screen === "quiz" && current && (
        <div className="paper torn-edge rounded-sm w-full max-w-md p-7 sm:p-9" ref={cardRef}>
          <div className="flex items-center justify-between mb-5">
            <div>
              <span
                className="text-[11px] tracking-[0.2em] uppercase"
                style={{ color: "#8B2635", fontFamily: "'JetBrains Mono', monospace" }}
              >
                {current.topic}
              </span>
              <div
                className="text-xs mt-1"
                style={{ color: "#8B7355", fontFamily: "'JetBrains Mono', monospace" }}
              >
                Soru {idx + 1} / {pool.length} · Puan {score}
              </div>
            </div>
            <Seal state={sealState} />
          </div>

          <div className="w-full h-1 rounded-full mb-6 overflow-hidden" style={{ background: "#E3D5AE" }}>
            <div
              className="h-full rounded-full transition-all duration-300"
              style={{ width: `${((idx + (selected !== null ? 1 : 0)) / pool.length) * 100}%`, background: "#B8935A" }}
            />
          </div>

          <h2
            className="text-2xl leading-snug mb-6"
            style={{ fontFamily: "'Cormorant Garamond', serif", color: "#2B2620", fontWeight: 600 }}
          >
            {current.q}
          </h2>

          <div className="flex flex-col gap-2.5 mb-6">
            {current.options.map((opt, i) => {
              const isChosen = selected === i;
              const isCorrectOpt = i === current.correct;
              let bg = "transparent";
              let border = "#C9B688";
              let textColor = "#2B2620";
              if (selected !== null) {
                if (isCorrectOpt) {
                  bg = "#E4EEE6";
                  border = "#3F6B4F";
                  textColor = "#2C4A36";
                } else if (isChosen) {
                  bg = "#F4E1E2";
                  border = "#8B2635";
                  textColor = "#6E1D28";
                }
              }
              return (
                <button
                  key={i}
                  onClick={() => choose(i)}
                  disabled={selected !== null}
                  className="btn-opt text-left px-4 py-3 rounded-sm text-sm sm:text-base"
                  style={{ background: bg, border: `1px solid ${border}`, color: textColor }}
                >
                  <span
                    className="inline-block w-5 text-xs mr-2"
                    style={{ fontFamily: "'JetBrains Mono', monospace", color: "#8B7355" }}
                  >
                    {String.fromCharCode(65 + i)}
                  </span>
                  {opt}
                </button>
              );
            })}
          </div>

          {selected !== null && (
            <button
              onClick={next}
              className="btn-opt w-full py-3 rounded-sm text-base tracking-wide"
              style={{ background: "#2B2620", color: "#F3EBD9", fontWeight: 600 }}
            >
              {idx + 1 >= pool.length ? "Sonucu Gör" : "Sonraki Soru"}
            </button>
          )}
        </div>
      )}

      {screen === "result" && (
        <div className="paper torn-edge rounded-sm w-full max-w-md p-7 sm:p-9 text-center">
          <div className="flex justify-center mb-4">
            <Seal state={score / pool.length >= 0.5 ? "correct" : "wrong"} />
          </div>
          <span
            className="text-[11px] tracking-[0.25em] uppercase"
            style={{ color: "#8B2635", fontFamily: "'JetBrains Mono', monospace" }}
          >
            Sınav Tamamlandı
          </span>
          <h2
            className="text-5xl my-3"
            style={{ fontFamily: "'Cormorant Garamond', serif", color: "#2B2620", fontWeight: 700 }}
          >
            {score} / {pool.length}
          </h2>
          <p className="text-sm mb-6" style={{ color: "#5B5140" }}>
            Başarı oranın %{Math.round((score / pool.length) * 100)}
            {bestScore && bestScore.score === score && bestScore.total === pool.length && (
              <span> — yeni rekorun!</span>
            )}
          </p>

          <div className="text-left mb-7 max-h-64 overflow-y-auto pr-1">
            {pool.map((q, i) => {
              const a = answers[i];
              const ok = a.chosen === a.correct;
              return (
                <div
                  key={q.id}
                  className="mb-2.5 px-3 py-2.5 rounded-sm text-xs"
                  style={{
                    background: ok ? "#E4EEE6" : "#F4E1E2",
                    border: `1px solid ${ok ? "#3F6B4F" : "#8B2635"}`,
                    color: "#2B2620",
                  }}
                >
                  <div className="mb-1" style={{ fontWeight: 600 }}>
                    {i + 1}. {q.q}
                  </div>
                  <div style={{ color: "#5B5140" }}>
                    Doğru cevap: {q.options[q.correct]}
                    {!ok && ` · Cevabın: ${q.options[a.chosen]}`}
                  </div>
                </div>
              );
            })}
          </div>

          <div className="flex gap-2">
            <button
              onClick={() => setScreen("start")}
              className="btn-opt flex-1 py-3 rounded-sm text-sm"
              style={{ border: "1px solid #C9B688", color: "#2B2620" }}
            >
              Menüye Dön
            </button>
            <button
              onClick={startQuiz}
              className="btn-opt flex-1 py-3 rounded-sm text-sm"
              style={{ background: "#2B2620", color: "#F3EBD9", fontWeight: 600 }}
            >
              Tekrar Dene
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(React.createElement(KpssTarihQuiz));
</script>
</body>
</html>
