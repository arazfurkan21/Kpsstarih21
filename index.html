<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPSS Tarih — Sınav Defteri</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@500&display=swap');

        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Source Serif 4', Georgia, serif;
            background: radial-gradient(ellipse at top, #F3EBD9 0%, #E9DDC0 55%, #DFCFA8 100%);
            color: #2B2620;
        }

        body { display: flex; align-items: center; justify-content: center; padding: 16px; }

        .wrap { width: 100%; max-width: 440px; }

        .paper {
            background-color: #FBF6E9;
            border: 1px solid #D8C7A0;
            box-shadow: 0 12px 30px -8px rgba(43,38,32,0.25);
            border-radius: 3px;
            padding: 28px 26px;
        }

        .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #8B2635; }

        .row-between { display: flex; align-items: center; justify-content: space-between; }

        h1.title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 42px; margin: 6px 0 8px; }

        .btn-primary { width: 100%; padding: 13px 0; border-radius: 3px; border: none; background: #2B2620; color: #F3EBD9; font-weight: 600; cursor: pointer; }

        .chip { padding: 10px 8px; border-radius: 3px; border: 1px solid #C9B688; background: transparent; cursor: pointer; text-align: center; margin: 4px; }

        .chip.active { background: #2B2620; color: #F3EBD9; }

        .option { display: block; width: 100%; padding: 12px 16px; margin: 8px 0; border-radius: 3px; border: 1px solid #C9B688; background: transparent; cursor: pointer; text-align: left; }

        .option.correct { background: #E4EEE6; border-color: #3F6B4F; }

        .option.wrong { background: #F4E1E2; border-color: #8B2635; }

        .progress-track { width: 100%; height: 4px; background: #E3D5AE; margin: 20px 0; }

        .progress-fill { height: 100%; background: #B8935A; transition: width .3s ease; }
    </style>
</head>

<body>

    <div class="wrap" id="root"></div>

    <script>
        const QUESTIONS = [
            { id: 1, topic: "İslamiyet Öncesi", q: "Türk tarihinde bilinen ilk Türk devleti aşağıdakilerden hangisidir?", options: ["Asya Hun", "Göktürk", "Uygur", "Avar"], correct: 0 },
            { id: 2, topic: "İslamiyet Öncesi", q: "Türk adının geçtiği ilk Türkçe metin hangisidir?", options: ["Orhun Abideleri", "Divan-ı Lügati't Türk", "Kutadgu Bilig", "Uygur Yazıtları"], correct: 0 },
            { id: 3, topic: "İlk Türk-İslam", q: "İlk Müslüman Türk devleti hangisidir?", options: ["Karahanlılar", "Gazneliler", "Selçuklular", "Tolunoğulları"], correct: 0 }
        ];

        let state = { screen: "start", topic: "İslamiyet Öncesi", pool: [], idx: 0, selected: null, answers: [] };

        function render() {
            const root = document.getElementById("root");
            
            if (state.screen === "start") {
                root.innerHTML = `
                    <div class="paper">
                        <span class="eyebrow">KPSS TARİH</span>
                        <h1 class="title">Sınav Defteri</h1>
                        <p>Konu seçip başlayabilirsin.</p>
                        <button class="btn-primary" onclick="startQuiz()">Sınava Başla</button>
                    </div>
                `;
            } else {
                const q = state.pool[state.idx];
                root.innerHTML = `
                    <div class="paper">
                        <div class="progress-track"><div class="progress-fill" style="width: ${(state.idx / state.pool.length) * 100}%"></div></div>
                        <h2>${q.q}</h2>
                        ${q.options.map((opt, i) => `
                            <button class="option" onclick="check(${i})">${opt}</button>
                        `).join('')}
                    </div>
                `;
            }
        }

        function startQuiz() {
            state.pool = QUESTIONS.filter(q => q.topic === state.topic);
            state.screen = "quiz";
            render();
        }

        function check(i) {
            const q = state.pool[state.idx];
            state.idx++;
            if (state.idx < state.pool.length) {
                render();
            } else {
                alert("Sınav bitti!");
                state.screen = "start";
                render();
            }
        }

        render();
    </script>
</body>
</html>
