<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPSS Tarih</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #f0f0f0; }
        .container { display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; padding: 10px; }
        .soru-alani { background: white; width: 95%; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .nav-buttons { margin-top: 20px; width: 100%; display: flex; justify-content: space-between; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #333; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="soru-alani" id="soru-kart">
        <h3 id="konu-baslik">Konu 1</h3>
        <p id="soru-metin">Osmanlı Devleti'nde ilk parayı kim bastırmıştır?</p>
        <button onclick="alert('Cevap: Osman Bey')">Cevabı Gör</button>
    </div>
    
    <div class="nav-buttons">
        <button onclick="onceki()">Geri</button>
        <button onclick="sonraki()">İleri</button>
    </div>
</div>

<script>
    const sorular = [
        {konu: "1. İlk Türk Devletleri", soru: "Türk adının anlamı nedir?"},
        {konu: "2. İslamiyet Öncesi", soru: "Hükümdara verilen ünvan?"},
        // Buraya 12 soruya kadar aynı yapıda ekle...
    ];
    let index = 0;
    function sonraki() { if(index < sorular.length-1) index++; guncelle(); }
    function onceki() { if(index > 0) index--; guncelle(); }
    function guncelle() {
        document.getElementById("konu-baslik").innerText = sorular[index].konu;
        document.getElementById("soru-metin").innerText = sorular[index].soru;
    }
</script>
</body>
</html>
